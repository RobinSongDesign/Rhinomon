---
# Yak package manifest for Rhinomon.
# Reference: https://developer.rhino3d.com/guides/yak/the-package-manifest/
#
# Build from a staging folder with this manifest, packaging/rhinomon.png, and
# the Release Rhinomon.rhp. See packaging/README.md for the publish workflow.

name: rhinomon
version: 0.1.0

authors:
  - RobinSongDesign

description: >
  Rhinomon is a pixel-art desktop pet that lives quietly in your Rhino 8
  viewport. It walks, climbs your geometry, and reacts to your modeling —
  drawn entirely through DisplayConduit, writing nothing to your document.
  It is designed to stay out of your way: near-zero draw cost, automatic
  animation throttling as scenes get heavier, zero extra redraws while a
  command is running, and a one-click kill switch that fully unloads it.

url: https://github.com/RobinSongDesign/Rhinomon

icon: rhinomon.png

keywords:
  - pet
  - desktop pet
  - viewport
  - fun
  - pixel art
